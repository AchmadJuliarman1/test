name: tugas-sesi19
on:
  push:
    branches:
      - main

jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: run test on main branch
        run: go test main.go

  Build:
    runs-on: ubuntu-latest
    needs: Testing
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Login dockerhub
        run: echo ${{secrets.DOCKERHUB_TOKEN}} | docker login -u
          ${{secrets.DOCKERHUB_USERNAME}} --password-stdin

      - name: Build image
        run: docker build -t ${{secrets.DOCKERHUB_USERNAME}}/tugas_sesi19 .

      - name: Push image to registry
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/tugas_sesi19
